<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>ViewportFixture</title>
    <style>
        :root {
            color-scheme: light;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            margin: 0;
            padding: 24px 16px 0;
            background: #f6f7fb;
            color: #1f2937;
        }

        .stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            border-radius: 18px;
            padding: 16px;
            background: white;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        .spacer {
            height: 1200px;
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.10), rgba(14, 165, 233, 0.22));
        }

        .fixed-bottom-marker {
            position: fixed;
            left: 16px;
            right: 16px;
            bottom: 0;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px 18px 0 0;
            background: rgba(15, 23, 42, 0.84);
            color: white;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.01em;
            pointer-events: none;
            z-index: 999;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            min-height: 52px;
            border-radius: 14px;
            border: 1px solid #cbd5e1;
            padding: 12px 14px;
            font-size: 17px;
        }
    </style>
</head>
<body>
    <main class="stack">
        <section class="card" id="top-marker">
            <strong>Top Marker</strong>
            <p>This fixture is bundled locally for WKViewportCoordinator UI tests.</p>
            <input id="top-input" type="text" value="Top Input">
        </section>
        <div class="spacer"></div>
        <section class="card" id="bottom-marker">
            <strong>Bottom Marker</strong>
            <p>Focus this field from the host app without performing network access.</p>
            <input id="bottom-input" type="text" value="Bottom Input">
        </section>
    </main>
    <div class="fixed-bottom-marker" id="fixed-bottom-marker">Fixed Bottom Marker</div>
    <script>
        const pendingStates = new Map();

        const buildErrorState = (message) => JSON.stringify({
            status: "error",
            revision: 0,
            activeElement: "",
            topMarkerTop: -1,
            topMarkerBottom: -1,
            bottomInputTop: -1,
            bottomInputBottom: -1,
            fixedBottomTop: -1,
            fixedBottomBottom: -1,
            viewportHeight: -1,
            bottomWithinViewport: false,
            fixedBottomWithinViewport: false,
            errorMessage: String(message)
        });

        const scheduleStateCapture = (requestID) => {
            pendingStates.delete(requestID);
            requestAnimationFrame(() => requestAnimationFrame(() => {
                try {
                    pendingStates.set(requestID, buildState());
                } catch (error) {
                    pendingStates.set(requestID, buildErrorState(error));
                }
            }));
        };

        const buildState = () => {
            const activeElement = document.activeElement?.id || "none";
            const topMarker = document.getElementById("top-marker");
            const bottomInput = document.getElementById("bottom-input");
            const fixedBottomMarker = document.getElementById("fixed-bottom-marker");
            const topRect = topMarker.getBoundingClientRect();
            const bottomRect = bottomInput.getBoundingClientRect();
            const fixedBottomRect = fixedBottomMarker.getBoundingClientRect();
            const viewportHeight = Math.round(window.visualViewport ? window.visualViewport.height : window.innerHeight);
            return JSON.stringify({
                status: "ready",
                revision: 0,
                activeElement,
                topMarkerTop: Math.round(topRect.top),
                topMarkerBottom: Math.round(topRect.bottom),
                bottomInputTop: Math.round(bottomRect.top),
                bottomInputBottom: Math.round(bottomRect.bottom),
                fixedBottomTop: Math.round(fixedBottomRect.top),
                fixedBottomBottom: Math.round(fixedBottomRect.bottom),
                viewportHeight,
                bottomWithinViewport: Math.round(bottomRect.bottom) <= viewportHeight,
                fixedBottomWithinViewport: Math.round(fixedBottomRect.bottom) <= viewportHeight,
                errorMessage: null
            });
        };

        window.testHarness = {
            requestStateCapture(requestID) {
                scheduleStateCapture(requestID);
            },
            focusInput(identifier, requestID) {
                const input = document.getElementById(identifier);
                if (input) {
                    input.focus();
                }
                scheduleStateCapture(requestID);
            },
            takePendingState(requestID) {
                const state = pendingStates.get(requestID) ?? null;
                pendingStates.delete(requestID);
                return state;
            }
        };
    </script>
</body>
</html>
